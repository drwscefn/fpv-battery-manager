name: fpv_battery_manager
description: "LIPO MGR - FPV LiPo battery manager with QR tracking and charge history."
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.21.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.27
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_barcode_scanning: ^0.13.0
  camera: ^0.11.0+1
  qr_flutter: ^4.1.0
  fl_chart: ^0.69.0
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  path: ^1.9.0
  intl: ^0.19.0
  gal: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.5
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
