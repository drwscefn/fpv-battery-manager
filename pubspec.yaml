name: fpv_battery_manager
description: "FPV LiPo Battery Manager - tracks FPV drone LiPo batteries using QR codes and camera OCR."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.21.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.27
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_barcode_scanning: ^0.13.0
  camera: ^0.11.0+1
  qr_flutter: ^4.1.0
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  flutter_blue_plus: ^1.35.5
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
